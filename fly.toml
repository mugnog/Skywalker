# Fly.io Konfiguration für Skywalker Backend
app = "mugnog"
primary_region = "fra"  # Frankfurt – nah an Deutschland

[build]

[env]
  SAVE_PATH = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "skywalker_data"
  destination = "/data"
